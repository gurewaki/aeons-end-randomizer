# Source of truth: 統合スプレッドシートの setup タブ
# サプライランダマイザの固定セットアップ。各スロットにタイプとコスト制約を持たせる。
# minCost / maxCost を省略すれば「下限なし / 上限なし」を意味する (両方省略でコスト不問)。
- name: ランダム
  slots:
    - { type: 宝石 }
    - { type: 宝石 }
    - { type: 宝石 }
    - { type: 遺物 }
    - { type: 遺物 }
    - { type: 呪文 }
    - { type: 呪文 }
    - { type: 呪文 }
    - { type: 呪文 }
- name: バランス
  slots:
    - { type: 宝石, maxCost: 3 }
    - { type: 宝石, minCost: 4, maxCost: 4 }
    - { type: 宝石, minCost: 5 }
    - { type: 遺物, maxCost: 3 }
    - { type: 遺物, minCost: 4 }
    - { type: 呪文, maxCost: 4 }
    - { type: 呪文, maxCost: 4 }
    - { type: 呪文, minCost: 5 }
    - { type: 呪文, minCost: 5 }
