# Source of truth: 統合スプレッドシートの setup タブ
# サプライランダマイザの固定セットアップ。各スロットにタイプとコスト制約を持たせる。
# minCost / maxCost を省略すれば「下限なし / 上限なし」を意味する (両方省略でコスト不問)。
# スロット数が 9 (Gem 3 / Relic 2 / Spell 4) の場合はサプライ全体、
# それ以外 (1 スロットなど) は単独抽選用 (探索行用) として扱われる。
# 並び順はシートの順番に合わせる (UI のタブ順 / デフォルト選択に影響)。
- name: バランス
  slots:
    - { type: 宝石, maxCost: 3 }
    - { type: 宝石, minCost: 4, maxCost: 4 }
    - { type: 宝石, minCost: 5 }
    - { type: 遺物, maxCost: 3 }
    - { type: 遺物, minCost: 4 }
    - { type: 呪文, maxCost: 4 }
    - { type: 呪文, maxCost: 4 }
    - { type: 呪文, minCost: 5 }
    - { type: 呪文, minCost: 5 }
- name: ランダム
  slots:
    - { type: 宝石 }
    - { type: 宝石 }
    - { type: 宝石 }
    - { type: 遺物 }
    - { type: 遺物 }
    - { type: 呪文 }
    - { type: 呪文 }
    - { type: 呪文 }
    - { type: 呪文 }
- name: 宝石1枚
  slots:
    - { type: 宝石 }
- name: 遺物1枚
  slots:
    - { type: 遺物 }
- name: 呪文1枚
  slots:
    - { type: 呪文 }
