id: aeons-end-promo
name: プロモーション
badge: プロモ
cards:
  # ---- Gem ----
  - name: エコーストーン
    type: 宝石
    cost: 4
    effect: |-
      2エーテルを得る。
      このターン中すでに <エコーストーン> をプレイしていたなら、追加で1エーテルを得る。

  # ---- Spell ----
  - name: 火中沈溺
    type: 呪文
    cost: 6
    effect: |-
      キャスト：4ダメージを与える。あなたは2チャージ失ってもよい。そうしたなら、この効果を再度適用する。
      （ダメージを修正する効果はこの両方のダメージに作用する）
  - name: 夢幻視
    type: 呪文
    cost: 3
    effect: |-
      キャスト：2ダメージを与える。
      各プレイヤーは自分のデッキの上から2枚を確認し、それらの中から任意の枚数を捨ててよい。そのあと、残りをデッキの上に戻す。
  - name: 破片弾
    type: 呪文
    cost: 5
    effect: "キャスト：4ダメージを与える。仲間1人は手札1枚を捨ててもよい。そうしたなら、このダメージはネメシスと任意の数のミニオンに自由に割り振ってもよい。"

mages: []
nemeses: []
