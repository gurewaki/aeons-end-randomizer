id: aeons-end-outer-dark
name: イーオンズ・エンド：外より来たりし闇
badge: 外より来たりし闇
cards:
  # ---- Gem ----
  - id: R028
    name: 異界元素
    type: 宝石
    cost: 4
    effect: "1エーテルを得る。呪文がセットされている自分の破孔1枚につき追加で1エーテルを得る。"
  - id: R029
    name: 呪われたベリライト
    type: 宝石
    cost: 3
    effect: |-
      2エーテルを得る。
      または
      手札1枚を捨てる。そうしたなら、チャージ2を得る。
  - id: R030
    name: ペインストーン
    type: 宝石
    cost: 6
    effect: |-
      3エーテルを得る。
      または
      2エーテルを得て、1ダメージを与える。

  # ---- Relic ----
  - id: R031
    name: アストラルキューブ
    type: 遺物
    cost: 5
    effect: "このターン中に自分がプレイした宝石1枚を手札に戻す。ターン順デッキの一番上のカードを公開する。それがプレイヤー側のターン順カードならそのプレイヤーは体力1を得る。公開したカードを元に戻す。"
  - id: R032
    name: 不可解な球体
    type: 遺物
    cost: 3
    effect: |-
      チャージ1を得る。
      または
      チャージ2を失ってもよい。そうしたなら、5エーテルを得る。

  # ---- Spell ----
  - id: R033
    name: 炭化
    type: 呪文
    cost: 8
    effect: "キャスト：6ダメージを与える。このダメージによってミニオンが捨てられたら、プレイヤー1人は体力2を得る。"
  - id: R034
    name: 触媒
    type: 呪文
    cost: 6
    effect: "キャスト：2ダメージを与える。自分の体力が2以下なら、追加で5ダメージを与える。"
  - id: R035
    name: フィードバックオーラ
    type: 呪文
    cost: 5
    effect: "キャスト：3ダメージを与える。自分が保有するチャージが4以上なら、追加で3ダメージを与える。"
  - id: R036
    name: 冥界導路
    type: 呪文
    cost: 7
    effect: "キャスト：コストが2エーテル以上の手札1枚を公開し、サプライにあるそのカードの山の枚数と初期枚数の差に等しいダメージを与える。そうしたなら、仲間1人は同じカード1枚をサプライから獲得してもよい。"
  - id: R037
    name: 火焔術
    type: 呪文
    cost: 7
    effect: "キャスト：1ダメージを与える。仲間を通じて、手札を2枚まで捨ててもよい。こうして捨てたカード1枚につき、追加で3ダメージを与える。"
  - id: R038
    name: 焦熱
    type: 呪文
    cost: 5
    effect: "キャスト：4ダメージを与える。ネメシスデッキから出たミニオンがこのダメージによって捨てられたら、仲間1人はチャージ2を得る。"

