id: aeons-end-outer-dark
name: イーオンズ・エンド：外より来たりし闇
cards:
  # ---- Gem ----
  - name: 異界元素
    type: 宝石
    cost: 4
    effect: "1エーテルを得る。呪文がセットされている自分の破孔1枚につき追加で1エーテルを得る。"
  - name: 呪われたベリライト
    type: 宝石
    cost: 3
    effect: |-
      2エーテルを得る。
      または
      手札1枚を捨てる。そうしたなら、チャージ2を得る。
  - name: ペインストーン
    type: 宝石
    cost: 6
    effect: |-
      3エーテルを得る。
      または
      2エーテルを得て、1ダメージを与える。

  # ---- Relic ----
  - name: アストラルキューブ
    type: 遺物
    cost: 5
    effect: |-
      このターン中に自分がプレイした宝石1枚を手札に戻す。
      ターン順デッキの一番上のカードを公開する。それがプレイヤー側のターン順カードならそのプレイヤーは体力1を得る。公開したカードを元に戻す。
  - name: 不可解な球体
    type: 遺物
    cost: 3
    effect: |-
      チャージ1を得る。
      または
      チャージ2を失ってもよい。そうしたなら、5エーテルを得る。

  # ---- Spell ----
  - name: 炭化
    type: 呪文
    cost: 8
    effect: "キャスト：6ダメージを与える。このダメージによってミニオンが捨てられたら、プレイヤー1人は体力2を得る。"
  - name: 触媒
    type: 呪文
    cost: 6
    effect: "キャスト：2ダメージを与える。自分の体力が2以下なら、追加で5ダメージを与える。"
  - name: フィードバックオーラ
    type: 呪文
    cost: 5
    effect: "キャスト：3ダメージを与える。自分が保有するチャージが4以上なら、追加で3ダメージを与える。"
  - name: 冥界導路
    type: 呪文
    cost: 7
    effect: "キャスト：コストが2エーテル以上の手札1枚を公開し、サプライにあるそのカードの山の枚数と初期枚数の差に等しいダメージを与える。そうしたなら、仲間1人は同じカード1枚をサプライから獲得してもよい。"
  - name: 火焔術
    type: 呪文
    cost: 7
    effect: |-
      キャスト：1ダメージを与える。
      仲間を通じて、手札を2枚まで捨ててもよい。こうして捨てたカード1枚につき、追加で3ダメージを与える。
  - name: 焦熱
    type: 呪文
    cost: 5
    effect: "キャスト：4ダメージを与える。ネメシスデッキから出たミニオンがこのダメージによって捨てられたら、仲間1人はチャージ2を得る。"

mages:
  - name: インディラ
    job: 破孔魔術師の弟子
    breaches: [x, x, ↓, x]
    uniqueCard:
      name: ツインオパール
      type: 宝石
      effect: |-
        1エーテルを得る。
        手札から呪文1枚をキャストしてもよい。
    hand: { unique: 1, crystal: 3, spark: 1 }
    deck: { unique: 1, crystal: 3, spark: 1 }
    skill:
      name: 火焔術師の策謀
      timing: 自分のメインフェイズ中に有効
      charge: 4
      effect: "自分の手札にある呪文を何枚でもキャストする。それらの呪文は追加で1ダメージを与える。自分の捨て山にあるカード1枚を破壊してもよい。"
  - name: レムナント
    job: エーテル体
    breaches: [o, →, →, ↓]
    uniqueBreach:
      number: 2
      effect: "1エーテルを得る"
    uniqueCard:
      name: 虚空片
      type: 宝石
      effect: |-
        1エーテルを得る。
        追加で破孔の強化あるいは開放にのみ使用できる1エーテルを得る。
    hand: { unique: 1, crystal: 2, spark: 2 }
    deck: { unique: 0, crystal: 4, spark: 1 }
    skill:
      name: 儚き仮面
      timing: 自分のメインフェイズ中に有効
      charge: 5
      effect: |-
        仲間1人は自分の捨て山にあるカード2枚を自分の手札に移す。
        または
        グレイヴホールドは体力5を得る。

nemeses:
  - name: 三度死せる預言者
    level: 5
    life: 40
    unleash: "<三度死せる預言者> は体力5を得る。その後、体力が60以上になったなら、ネメシストークン1個を得る。"
    additionalRules: |-
      - ネメシスターンの終了時、 <三度死せる預言者> がネメシストークンを4個以上保有しているなら、ネメシスデッキの一番上のカードを捨てて、 <三度死せる預言者> はネメシストークン4個を失う。
      -  <三度死せる預言者> の体力に上限はない（このマットに記載されている初期値を越えて体力を獲得できる）。
      -  <三度死せる預言者> の体力が99以上になったら、 <三度死せる預言者> は不死となり、プレイヤーはゲームに敗北する。
      - ネメシスデッキが空になったら、 <三度死せる預言者> は最後の儀式を完了し、プレイヤーはゲームに敗北する。
    increasedDifficulty: "ゲームの準備時： <三度死せる預言者> は体力15を得る。"
    battle: 2
    rule: "<三度死せる預言者> と戦う。"
    cards:
      # ---- ネメシスデッキ ----
      - placement: ネメシスデッキ
        tier: 1
        name: 激昂
        type: アタック
        effect: |-
          プレイヤー1人は4ダメージを受ける。
          <三度死せる預言者> はネメシストークン1個を得る。
      - placement: ネメシスデッキ
        tier: 1
        name: 運命を吸う者
        type: ミニオン
        life: 6
        effect: "継続：プレイヤー1人は1ダメージを受ける。<三度死せる預言者> はネメシストークン1個を得る。"
      - placement: ネメシスデッキ
        tier: 1
        name: 死なぬ者の勝利
        type: パワー
        effect: "パワー3：<三度死せる預言者> の体力が40以下なら、グレイヴホールドは7ダメージを受ける。そうでないなら、<三度死せる預言者> はネメシストークンを3個得る。"
      - placement: ネメシスデッキ
        tier: 2
        name: 黄金を纏った彫像
        type: ミニオン
        life: 12
        effect: "継続：<三度死せる預言者> の体力が40以下なら、<三度死せる預言者> は体力7を得る。そうでないなら、グレイヴホールドは3ダメージを受ける。"
      - placement: ネメシスデッキ
        tier: 2
        name: 永劫禁止令
        type: パワー
        effect: |-
          廃棄：7エーテルを消費する。
          パワー2：プレイヤー1人は4ダメージを受ける。<三度死せる預言者> はネメシストークン3個を得る。
      - placement: ネメシスデッキ
        tier: 2
        name: 蛹の盾
        type: パワー
        effect: "パワー2：<三度死せる預言者> の体力が40以下なら、暴走（3回）。そうでないなら、<三度死せる預言者> はネメシストークン3個を得る。"
      - placement: ネメシスデッキ
        tier: 3
        name: サイフォン
        type: アタック
        effect: "<三度死せる預言者> の体力が30以下なら、暴走し、全プレイヤーを通じてセット中の呪文のうち、コストが最も高い3枚を捨てる。そうでないなら、全プレイヤーを通じて9ダメージを受ける。"
      - placement: ネメシスデッキ
        tier: 3
        name: 忍耐
        type: アタック
        effect: "<三度死せる預言者> の体力が30以下なら、暴走（4回）。そうでないなら、ネメシスデッキの一番上のカードを捨てる。"
      - placement: ネメシスデッキ
        tier: 3
        name: 失われた観察者
        type: ミニオン
        life: 17
        effect: "継続：ネメシスデッキの一番上のカードを捨てる。"
  - name: レイスモンガー
    level: 6
    life: 70
    unleash: "保有する恐怖タイルが最も少ないプレイヤー1人は、まだ獲得されていない恐怖タイルのうち番号が最大のものを受け取り、その効果を適用する。"
    additionalRules: |-
      - プレイヤーはそれぞれ、自分のメインフェイズ中にチャージ4を失ってもよい。そうしたなら、全プレイヤーが獲得している恐怖タイルすべてを恐怖マットの所定の場所に戻す。
      - 1番の恐怖タイルが獲得されたら、プレイヤーはゲームに敗北する。
      - プレイヤーが恐怖タイルを獲得したら、そのタイルを自分のプレイヤーマットの特殊能力のテキストの上に配置する。恐怖タイルを得ているプレイヤーは特殊能力を使用できない。
      - プレイヤーが疲弊状態になったら、通常の暴走効果を2回適用する代わりに、グレイヴホールドは4ダメージを受ける。その後、通常の疲弊状態の処理を続ける。
    setup: "このマットの横に恐怖マットを配置する。すべての恐怖タイルを、恐怖マットにある番号が一致する枠に配置する。"
    increasedDifficulty: "ゲームの準備時：ゲームから7番の恐怖タイルを取り除く。"
    battle: 4
    rule: "<レイスモンガー> と戦う。"
    cards:
      # ---- ネメシスデッキ ----
      - placement: ネメシスデッキ
        tier: 1
        name: 慄然
        type: アタック
        effect: "プレイヤー1人は未獲得の恐怖タイルのうち、番号が最も大きい2枚を獲得せず、任意の順で効果を適用する。"
      - placement: ネメシスデッキ
        tier: 1
        name: 奥底の悪夢
        type: ミニオン
        life: 5
        effect: "継続：プレイヤー1人は未獲得の恐怖タイルのうち、番号が最も大きい1枚を獲得せず、効果を適用する。"
      - placement: ネメシスデッキ
        tier: 1
        name: 巻きつく恐怖
        type: パワー
        effect: "パワー3：暴走。番号が最も小さい恐怖タイルを保有するプレイヤーはその恐怖タイルの効果を適用する。"
      - placement: ネメシスデッキ
        tier: 2
        name: 顕現
        type: アタック
        effect: |-
          保有する恐怖タイルの枚数が最も少ないプレイヤーは、未獲得の恐怖タイルのうち、番号が最も大きい3枚の効果を無視して獲得する。
          または
          プレイヤー1人はチャージ1を失い、4ダメージを受ける。
      - placement: ネメシスデッキ
        tier: 2
        name: 生細胞体
        type: ミニオン
        life: 10
        effect: "継続：暴走。プレイヤー1人はチャージ1を失う。"
      - placement: ネメシスデッキ
        tier: 2
        name: 正気漏出
        type: パワー
        effect: "パワー3：暴走。獲得されている恐怖タイルのうち、番号が最も大きいものをゲームから取り除く。"
      - placement: ネメシスデッキ
        tier: 3
        name: 錯乱
        type: アタック
        effect: |-
          保有するチャージが最も多いプレイヤーはチャージをすべて失う。
          そのプレイヤーは恐怖タイルのうち、番号が最も大きい2枚を獲得する（未獲得でなくても）。その後、保有しているすべての恐怖タイルの効果を任意の順で適用する。
      - placement: ネメシスデッキ
        tier: 3
        name: 超越せしもの
        type: ミニオン
        life: 16
        effect: "継続：暴走。獲得されている恐怖タイルのうち、番号が最も大きいものをゲームから取り除く。"
      - placement: ネメシスデッキ
        tier: 3
        name: 脈打つ狂気
        type: パワー
        effect: |-
          廃棄：コストが3エーテル以上のセット中の呪文2枚を破壊する。
          パワー2：保有する恐怖タイルの枚数が最も少ないプレイヤーは、1番以外の恐怖タイルをすべて効果を無視して獲得する。

nemesisCards:
  - category: 基本カード
    tier: 1
    name: 迷宮にたなびくもの
    type: ミニオン
    life: 5
    effect: |-
      継続：プレイヤー1人は自分のセット中の呪文1枚を捨てる。
      または
      プレイヤー1人はチャージ1を失う。
  - category: 基本カード
    tier: 2
    name: 猛攻
    type: アタック
    effect: "暴走（2回）。最もコストの高い呪文をセット中のプレイヤーはその呪文を自分のデッキの一番上に戻す。"
  - category: 基本カード
    tier: 3
    name: 生物解体
    type: パワー
    effect: |-
      廃棄：8エーテルを消費する。
      パワー2：体力が最も多いプレイヤーは、現在の体力に等しいダメージを受ける。
