id: aeons-end-outer-dark
name: イーオンズ・エンド：外より来たりし闇
cards:
  # ---- Gem ----
  - name: 異界元素
    type: 宝石
    cost: 4
    effect: "1エーテルを得る。呪文がセットされている自分の破孔1枚につき追加で1エーテルを得る。"
  - name: 呪われたベリライト
    type: 宝石
    cost: 3
    effect: |-
      2エーテルを得る。
      または
      手札1枚を捨てる。そうしたなら、チャージ2を得る。
  - name: ペインストーン
    type: 宝石
    cost: 6
    effect: |-
      3エーテルを得る。
      または
      2エーテルを得て、1ダメージを与える。

  # ---- Relic ----
  - name: アストラルキューブ
    type: 遺物
    cost: 5
    effect: |-
      このターン中に自分がプレイした宝石1枚を手札に戻す。
      ターン順デッキの一番上のカードを公開する。それがプレイヤー側のターン順カードならそのプレイヤーは体力1を得る。公開したカードを元に戻す。
  - name: 不可解な球体
    type: 遺物
    cost: 3
    effect: |-
      チャージ1を得る。
      または
      チャージ2を失ってもよい。そうしたなら、5エーテルを得る。

  # ---- Spell ----
  - name: 炭化
    type: 呪文
    cost: 8
    effect: "キャスト：6ダメージを与える。このダメージによってミニオンが捨てられたら、プレイヤー1人は体力2を得る。"
  - name: 触媒
    type: 呪文
    cost: 6
    effect: "キャスト：2ダメージを与える。自分の体力が2以下なら、追加で5ダメージを与える。"
  - name: フィードバックオーラ
    type: 呪文
    cost: 5
    effect: "キャスト：3ダメージを与える。自分が保有するチャージが4以上なら、追加で3ダメージを与える。"
  - name: 冥界導路
    type: 呪文
    cost: 7
    effect: "キャスト：コストが2エーテル以上の手札1枚を公開し、サプライにあるそのカードの山の枚数と初期枚数の差に等しいダメージを与える。そうしたなら、仲間1人は同じカード1枚をサプライから獲得してもよい。"
  - name: 火焔術
    type: 呪文
    cost: 7
    effect: |-
      キャスト：1ダメージを与える。
      仲間を通じて、手札を2枚まで捨ててもよい。こうして捨てたカード1枚につき、追加で3ダメージを与える。
  - name: 焦熱
    type: 呪文
    cost: 5
    effect: "キャスト：4ダメージを与える。ネメシスデッキから出たミニオンがこのダメージによって捨てられたら、仲間1人はチャージ2を得る。"

mages:
  - name: インディラ
    job: 破孔魔術師の弟子
    breaches: [x, x, ↓, x]
    uniqueCard:
      name: ツインオパール
      type: 宝石
      effect: |-
        1エーテルを得る。
        手札から呪文1枚をキャストしてもよい。
    hand: { unique: 1, crystal: 3, spark: 1 }
    deck: { unique: 1, crystal: 3, spark: 1 }
    skill:
      name: 火焔術師の策謀
      timing: 自分のメインフェイズ中に有効
      charge: 4
      effect: "自分の手札にある呪文を何枚でもキャストする。それらの呪文は追加で1ダメージを与える。自分の捨て山にあるカード1枚を破壊してもよい。"
  - name: レムナント
    job: エーテル体
    breaches: [o, →, →, ↓]
    uniqueBreach:
      number: 2
      effect: "1エーテルを得る"
    uniqueCard:
      name: 虚空片
      type: 宝石
      effect: |-
        1エーテルを得る。
        追加で破孔の強化あるいは開放にのみ使用できる1エーテルを得る。
    hand: { unique: 1, crystal: 2, spark: 2 }
    deck: { unique: 0, crystal: 4, spark: 1 }
    skill:
      name: 儚き仮面
      timing: 自分のメインフェイズ中に有効
      charge: 5
      effect: |-
        仲間1人は自分の捨て山にあるカード2枚を自分の手札に移す。
        または
        グレイヴホールドは体力5を得る。

nemeses:
  - name: 三度死せる預言者
    level: 5
    battle: 2
    rule: "<三度死せる預言者> と戦う。"
  - name: レイスモンガー
    level: 6
    battle: 4
    rule: "<レイスモンガー> と戦う。"

nemesisCards:
  - category: 基本カード
    tier: 1
    name: 迷宮にたなびくもの
    type: ミニオン
    life: 5
    effect: |-
      継続：プレイヤー1人は自分のセット中の呪文1枚を捨てる。
      または
      プレイヤー1人はチャージ1を失う。
  - category: 基本カード
    tier: 2
    name: 猛攻
    type: アタック
    effect: "暴走（2回）。最もコストの高い呪文をセット中のプレイヤーはその呪文を自分のデッキの一番上に戻す。"
  - category: 基本カード
    tier: 3
    name: 生物解体
    type: パワー
    effect: |-
      廃棄：8エーテルを消費する。
      パワー2：体力が最も多いプレイヤーは、現在の体力に等しいダメージを受ける。
