id: aeons-end-buried-secrets
name: イーオンズ・エンド：埋もれた秘密
cards:
  # ---- Gem ----
  - name: 振動結晶塊
    type: 宝石
    cost: 3
    effect: |-
      2エーテルを得る。パルストークン1個を得る。
      または
      2エーテルを得る。パルストークン1個を失ってもよい。そうしたなら、チャージ1を得る。
  - name: メンタイト塊
    type: 宝石
    cost: 5
    effect: |-
      3エーテルを得る。
      自分の捨て山が7枚以上あるなら、追加で1エーテルを得る。
  - name: 沈静ラコサイト
    type: 宝石
    cost: 5
    effect: |-
      これを獲得したとき、ミニオン1体を沈静化する。
      3エーテルを得る。
  - name: オブリヴィウム樹脂
    type: 宝石
    cost: 5
    effect: |-
      2エーテルを得る。
      自分の手札にコストが0エーテルのカードが3枚以上あるなら、追加で2エーテルを得る。
  - name: 光輝テトライト
    type: 宝石
    cost: 6
    effect: "4エーテルを得る。このエーテルはカードの獲得以外にのみ使用できる。"
  - name: 召喚石
    type: 宝石
    cost: 3
    effect: |-
      2エーテルを得る。
      または
      サプライから <召喚石> 1枚を獲得し、それを仲間1人の捨て山の一番上に配置する。
  - name: トリプライト核
    type: 宝石
    cost: 4
    effect: "3エーテルを得る。このエーテルはカードの獲得にのみ使用できる。"
  - name: 虚空石スパイク
    type: 宝石
    cost: 3
    effect: |-
      2エーテルを得る。
      各仲間は手札1枚を捨ててもよい。そうしたプレイヤーはチャージ1を得る。

  # ---- Relic ----
  - name: 瓶に詰められた星
    type: 遺物
    cost: 7
    effect: "チャージ3を得る。"
  - name: リビングガントレット
    type: 遺物
    cost: 4
    effect: |-
      自分のデッキの一番上のカードを公開する。それを破壊するか、あるいは捨ててもよい。
      各仲間はカード1枚を引いてもよい。そうしたプレイヤーは手札1枚を捨てる。
  - name: 多相コンテナ
    type: 遺物
    cost: 4
    effect: |-
      1エーテルを得る。
      このターン中、次にカードを獲得したとき、そのカードよりもコストが低いカード1枚を追加で獲得してもよい。
  - name: 学者が遺した作品
    type: 遺物
    cost: 3
    effect: |-
      チャージ1を得る。
      自分の捨て山が7枚以上あるなら、追加でチャージ1を得る。
  - name: ソウルコード
    type: 遺物
    cost: 5
    effect: "プレイヤー1人はパルストークン1個を得る。パルストークンを2個以上保有するプレイヤーはそれぞれチャージ1を得る。"

  # ---- Spell ----
  - name: 智恵の刃
    type: 呪文
    cost: 6
    effect: |-
      これを獲得したとき、獲得したこのカードを除き、自分の捨て山が7枚以上あるなら、体力2を得る。
      キャスト：5ダメージを与える。
  - name: 火焔流
    type: 呪文
    cost: 3
    effect: |-
      セット中：自分の呪文フェイズ中、パルストークン2個を失ってもよい。そうしたなら、このターン中にあなたがキャストする呪文は追加で1ダメージを与える。
      キャスト：1ダメージを与える。パルストークン1個を得る。
  - name: ダブルタップ
    type: 呪文
    cost: 3
    effect: |-
      キャスト：1ダメージを与える。1ダメージを与える。
      （ダメージに影響を与える効果は、この呪文のキャスト時のダメージ両方に影響を与える）
  - name: ドレインタッチ
    type: 呪文
    cost: 2
    effect: "キャスト：1ダメージを与える。チャージ1を得る。"
  - name: 知性の輝き
    type: 呪文
    cost: 4
    effect: |-
      リンク（リンクをもつ呪文は同じ破孔に2枚までセットできる）
      キャスト：3ダメージを与える。キャストしたこのカードを除き、自分の捨て山が6枚以上あるなら、サプライから <知性の輝き> 1枚を獲得して自分のデッキの一番上に移してもよい。
  - name: 神経刺突
    type: 呪文
    cost: 2
    effect: "キャスト：1ダメージを与える。ミニオン1体を沈静化する。"
  - name: 精密射撃
    type: 呪文
    cost: 3
    effect: |-
      リンク（リンクをもつ呪文は同じ破孔に2枚までセットできる）
      キャスト：2ダメージを与える。キャストしたこのカードを除き、自分の捨て山が6枚以上あるなら、追加で2ダメージを与える。
  - name: 精神噴出
    type: 呪文
    cost: 8
    effect: "キャスト：プレイヤー1人の捨て山にあるカードの枚数に等しいダメージを与える。"
  - name: 物理衝撃
    type: 呪文
    cost: 5
    effect: "キャスト：ネメシスに4ダメージを与える。ミニオン1体を沈静化する。"

mages: []
nemeses: []

nemesisCards:
  # ---- 階層 1 ----
  - category: 基本カード
    tier: 1
    name: 刀剣嵐
    type: アタック
    effect: |-
      グレイヴホールドは3ダメージを受ける。
      開放状態の破孔が最も少ないプレイヤー1人は、2ダメージを受ける。
  - category: 基本カード
    tier: 1
    name: 群れを指揮する者
    type: ミニオン
    life: 1
    shield: 3
    effect: "継続：プレイに出ているほかのミニオンが2体以上なら、グレイヴホールドは6ダメージを受けてこのミニオンを捨てる。そうでないなら、プレイヤー1人は2ダメージを受ける。"
  - category: 基本カード
    tier: 1
    name: 脆弱呪詛
    type: パワー
    effect: |-
      廃棄：6エーテルを消費する。
      パワー3：このカードを最も体力が多いプレイヤーのそばに配置する。このゲーム中、そのプレイヤーはダメージを受けるたびに追加で1ダメージを受ける。こうしてパワー効果によって配置されたこのカードは取り除けない（廃棄効果も無効）。

  # ---- 階層 2 ----
  - category: 基本カード
    tier: 2
    name: 偏向
    type: アタック
    effect: "最もコストが高い呪文をセット中のプレイヤーはその呪文をキャストする。その呪文が与えるダメージはそれをキャストしたプレイヤーが受ける。"
  - category: 基本カード
    tier: 2
    name: 鎧をまとう霞
    type: ミニオン
    life: 1
    shield: 4
    effect: "継続：プレイヤー1人は、このミニオンが保有するシールドトークン1個につき1ダメージを受ける。そのあと、このミニオンは1ダメージを受ける。"
  - category: 基本カード
    tier: 2
    name: 無価値
    type: パワー
    effect: |-
      廃棄：7エーテルを消費する。
      パワー2：暴走（2回）。最もコストが高い手札を持つプレイヤーはそのカードを破壊し、破壊したカードより低いコストをもつ同種類のカード1枚をサプライから獲得する。そのプレイヤーは2ダメージを受ける。

  # ---- 階層 3 ----
  - category: 基本カード
    tier: 3
    name: 召集
    type: アタック
    effect: "暴走（2回）。プレイに出ている各ミニオンは体力5を得る。"
  - category: 基本カード
    tier: 3
    name: 帷子をまとう影
    type: ミニオン
    life: 8
    shield: 1
    effect: |-
      このミニオンは破孔IIIからキャストされた呪文によってのみダメージを受ける。
      継続：暴走（2回）。
  - category: 基本カード
    tier: 3
    name: 破孔トンネル
    type: パワー
    effect: "パワー4：全プレイヤーに閉鎖状態の破孔がそれぞれ1枚以上あるなら、ネメシスが圧倒し、プレイヤーはゲームに敗北する。"
