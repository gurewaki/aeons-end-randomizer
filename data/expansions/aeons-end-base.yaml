id: aeons-end-base
name: イーオンズ・エンド
cards:
  # ---- Gem (宝石) ----
  - name: 燃えるオパール
    type: 宝石
    cost: 5
    effect: |-
      3エーテルを得る。
      自分の手札にあるカード1枚を捨ててもよい。そうしたなら、仲間1人はカード1枚を引く。
  - name: 雲色サファイア
    type: 宝石
    cost: 6
    effect: |-
      3エーテルを得る。
      これがこのターン中にプレイした最初の <雲色サファイア> なら、仲間1人はチャージ1を得る。
  - name: 群生ダイヤモンド
    type: 宝石
    cost: 4
    effect: |-
      2エーテルを得る。
      これがこのターン中にプレイした2枚目の <群生ダイヤモンド> なら、追加で2エーテルを得る。
  - name: 翡翠
    type: 宝石
    cost: 2
    effect: "2エーテルを得る。"
  - name: 赤熱ルビー
    type: 宝石
    cost: 4
    effect: "2エーテルを得る。追加で1エーテルを得る。追加で得たエーテルは呪文カードの獲得にのみ使用できる。"
  - name: 変化の真珠
    type: 宝石
    cost: 3
    effect: |-
      2エーテルを得る。
      各プレイヤーはそれぞれ自分のデッキの一番上のカードを公開し、それを捨てるか、あるいはデッキの一番上に戻すかを選ぶ。
  - name: グリスウッドの琥珀
    type: 宝石
    cost: 3
    effect: |-
      これを獲得した時、捨て山ではなく自分のデッキの上にこれを配置してもよい。
      2エーテルを得る。

  # ---- Relic (遺物) ----
  - name: 強撃杖
    type: 遺物
    cost: 4
    effect: "このターン中にセットした呪文1枚をキャストしてもよい。そうした場合、その呪文は追加で2ダメージを与える。"
  - name: 瓶詰の渦動
    type: 遺物
    cost: 3
    effect: |-
      これを破壊する。
      自分の手札か捨て山にあるカード2枚までを破壊する。
      カード1枚を引く。
  - name: 屈曲ダガー
    type: 遺物
    cost: 2
    effect: |-
      このターン中、次に破孔を強化あるいは開放するとき、そのコストは3エーテル低下する。
      または
      これを破壊する。1ダメージを与える。
  - name: 強化オーブ
    type: 遺物
    cost: 4
    effect: |-
      プレイヤー1人の破孔ひとつを強化する。
      または
      これを破壊する。グレイヴホールドは体力3を得る。
  - name: 魔術師の護符
    type: 遺物
    cost: 5
    effect: |-
      チャージ1を得る。
      仲間1人はチャージ1を得る。
  - name: ゆらめくプリズム
    type: 遺物
    cost: 3
    effect: |-
      自分の手札にある1枚の宝石カードを2回プレイし、そのカードを破壊する。
      または
      2エーテルを得る。

  # ---- Spell (呪文) ----
  - name: ヴィジョン増幅
    type: 呪文
    cost: 4
    effect: "キャスト：自分の閉鎖状態の破孔のうち、現在の強化コストが最小のもの1枚を強化する。2ダメージを与える。もし自分の破孔がすべて開放状態なら、追加で1ダメージを与える。"
  - name: 魔力結節
    type: 呪文
    cost: 7
    effect: |-
      セット中：自分のターンのメインフェイズ中に1回のみ、そのターンにプレイした宝石カード1枚を自分の手札に戻してもよい。
      キャスト：4ダメージを与える。
  - name: カオス・アーク
    type: 呪文
    cost: 6
    effect: "キャスト：3ダメージを与える。さらに、これに隣接する破孔にセットされている呪文1枚につき追加で2ダメージを与える。"
  - name: 飲み込む虚無
    type: 呪文
    cost: 7
    effect: "キャスト：自分の手札にあるカード2枚までを破壊する。こうして破壊したカード1枚につき3ダメージを与える。"
  - name: 闇色炎
    type: 呪文
    cost: 5
    effect: "キャスト：自分の手札にあるカード2枚までを捨てる。こうして捨てたカード1枚につき3ダメージを与える。"
  - name: エッセンス強奪
    type: 呪文
    cost: 5
    effect: "キャスト：3ダメージを与える。この時、自分の手札にあるカード1枚を捨ててもよい。そうしたなら、プレイヤー1人は体力1を得る。"
  - name: 凶雷
    type: 呪文
    cost: 5
    effect: |-
      この呪文は、強化を行っていない閉鎖状態の破孔にもセットできる。
      キャスト：3ダメージを与える。
  - name: 炎上
    type: 呪文
    cost: 4
    effect: "キャスト：2ダメージを与える。仲間1人はチャージ1を得る。"
  - name: 溶岩触肢
    type: 呪文
    cost: 4
    effect: |-
      セット中：自分のターンの呪文フェイズの終了時に1ダメージを与える。
      キャスト：3ダメージを与える。
  - name: 膨らむ忘却
    type: 呪文
    cost: 5
    effect: |-
      セット中：自分のターンのメインフェイズ中に1回だけ、1エーテルを獲得してもよい。
      キャスト：2ダメージを与える。この時、自分の手札にある宝石カード1枚を捨ててもよい。そうしたなら、そのコストに等しいだけのダメージを追加で与える。
  - name: 不死鳥炎
    type: 呪文
    cost: 3
    effect: "キャスト：2ダメージを与える。この時、自分のチャージ1を捨ててもよい。そうしたなら、追加で2ダメージを与える。"
  - name: 空間洞察
    type: 呪文
    cost: 6
    effect: "キャスト：2ダメージを与える。自分の開放状態の破孔1枚につき1ダメージを追加で与える。"
  - name: スペクトル残響
    type: 呪文
    cost: 3
    effect: "キャスト：2ダメージを与える。自分の手札にあるカード1枚を破壊してもよい。"
  - name: 熾火の鞭
    type: 呪文
    cost: 6
    effect: |-
      セット中：自分のターンのメインフェイズ中、2エーテルを消費してもよい。そうしたなら、プレイヤー1人がセットしている呪文をキャストする。
      キャスト：4ダメージを与える。

mages:
  - name: アーデルハイム
    job: 破孔魔術師の鍛冶屋
    breaches: [o, ←, →, ↓]
    uniqueCard:
      name: アメジスト片
      type: 宝石
      effect: |-
        1エーテルを得る。
        仲間1人は、カード1枚を引いてから手札のカード1枚を捨ててもよい。
    hand: { unique: 1, crystal: 2, spark: 2 }
    deck: { unique: 0, crystal: 5, spark: 0 }
    skill:
      name: エーテル防御陣
      timing: ネメシスのカード公開フェイズに有効
      charge: 5
      effect: "ネメシスのアタックカードあるいはパワーカードが公開されたとき、解決する前にそのカードを捨てることができる。捨てられるカードの効果は発動しない（代わりのカードを公開することもない）。"
  - name: ブラマ
    job: 長老
    breaches: [o, ↓, →, ←]
    uniqueCard:
      name: 隠された光
      type: 呪文
      effect: "キャスト：1ダメージを与える。1エーテルを得る。"
    hand: { unique: 1, crystal: 4, spark: 0 }
    deck: { unique: 0, crystal: 3, spark: 2 }
    skill:
      name: 間際の体力注入
      timing: 自分のメインフェイズ中に有効
      charge: 5
      effect: "プレイヤー1人は体力4を得る。"
  - name: ジアン
    job: 孤児
    breaches: [o, o, →, ↓]
    uniqueCard:
      name: ムーンストーン片
      type: 宝石
      effect: |-
        1エーテルを得る。
        追加で1エーテルを得る。追加で得たエーテルは宝石カードの獲得にのみ使用できる。
    hand: { unique: 1, crystal: 2, spark: 2 }
    deck: { unique: 0, crystal: 3, spark: 2 }
    skill:
      name: 黒の鏡
      timing: 自分のメインフェイズ中に有効
      charge: 4
      effect: "プレイヤー1人のセット中の呪文1枚を、それを捨てることなくキャストする。その後、その呪文をもう一度キャストする（呪文はその後に捨てる）。"
  - name: カディア
    job: 探索者
    breaches: [o, ←, ↓, ←]
    uniqueCard:
      name: エメラルド片
      type: 宝石
      effect: |-
        1エーテルを得る。
        または
        プレイヤー1人は体力1を得る。
    hand: { unique: 1, crystal: 3, spark: 1 }
    deck: { unique: 0, crystal: 3, spark: 2 }
    skill:
      name: 異世界ゲート
      timing: 任意のプレイヤーのメインフェイズ中に有効
      charge: 5
      effect: "ターンプレイヤーは、地震の捨て山から3枚までの呪文カードを手札に戻すことができる。そのプレイヤーは、そのターン中に開放状態の破孔それぞれに対して、2枚までの呪文をセットできる。"
  - name: ラッシュ
    job: 斥候
    breaches: [o, ←, →, ←]
    uniqueCard:
      name: クォーツ片
      type: 宝石
      effect: |-
        1エーテルを得る。
        ターン順カードの山札の一番上を公開し、それを山札の上か底のどちらかに戻す。公開したカードがプレイヤー側のターン順カードだったなら、さらに1エーテルを得る。
    hand: { unique: 1, crystal: 3, spark: 1 }
    deck: { unique: 0, crystal: 3, spark: 2 }
    skill:
      name: 思考加速
      timing: 任意のプレイヤーのメインフェイズ中に有効
      charge: 5
      effect: "ターン順カードの捨て山にある、プレイヤーを指すターン順カード1枚を、ターン順カードの山札に戻してシャッフルする。そのプレイヤーは1ダメージを受ける。このとき、プレイヤー1人に対応しないターン順カード（複数のプレイヤーの中からターンプレイヤーを選択できるカード）は選べない。"
  - name: ミスト
    job: ダガーキャプテン
    breaches: [o, ←, ↓, ↓]
    uniqueCard:
      name: ガーネット片
      type: 宝石
      effect: |-
        1エーテルを得る。
        または
        プレイヤー1人の、セットされている呪文1枚をキャストする。
    hand: { unique: 1, crystal: 3, spark: 1 }
    deck: { unique: 0, crystal: 3, spark: 2 }
    skill:
      name: 神占
      timing: 自分のメインフェイズ中に有効
      charge: 5
      effect: "仲間はカード4枚を引く。"
  - name: フェドラクサ
    job: 予言者
    breaches: [x, o, ↓, ←]
    uniqueCard:
      name: トルマリン片
      type: 宝石
      effect: |-
        1エーテルを得る。
        仲間1人は1ダメージを受けてもよい。そうしたなら、その仲間は自分の手札にあるカード1枚を破壊する。
    hand: { unique: 1, crystal: 3, spark: 1 }
    deck: { unique: 0, crystal: 4, spark: 1 }
    skill:
      name: 予兆のルーン
      timing: ターン順決定カードが引かれた直後に有効
      charge: 5
      effect: "そのターン中、グレイヴホールドおよびプレイヤーに与えられる全ダメージを無効にする。"
  - name: ザクソス
    job: 熟練者
    breaches: [o, →, →, ↓]
    uniqueCard:
      name: 火炎
      type: 呪文
      effect: "キャスト：ターン順カードの山札の一番上を公開し、また山札の上に戻す。公開したカードがプレイヤー側のターン順カードだったなら3ダメージを与える。そうでないなら1ダメージを与える。"
    hand: { unique: 1, crystal: 4, spark: 0 }
    deck: { unique: 0, crystal: 4, spark: 1 }
    skill:
      name: 思惟リンク
      timing: 任意のプレイヤーのメインフェイズ中に有効
      charge: 5
      effect: "仲間は合計で4チャージを得る。ターン順決定ｶｰﾄﾞの山札にある全カードを確認し、それらを任意の順で山札に戻す。"

nemeses:
  - name: レイジボーン
    level: 2
    life: 70
    unleash: "激怒トークン1個をこのマットに載せる。"
    additionalRules: |-
      レイジボーンがストライクを行ったら、次の各項をこの順で適用する。
      - ストライクの山札の上からカード1枚を引いて公開し、それを解決する。
      - 引いたカードを山札の上に戻し、それをシャッフルする。
      - このマットから激怒トークン3個を取り除く。
      ネメシスのターン終了時、このマットに激怒トークンが4個以上載っているなら、レイジボーンはストライクを1回行う。
    setup: |-
      - ストライクカード（「ストライク」という種類名をもつネメシスカード）をひとまとめにして裏返してシャッフルし、ストライクカードの山札を作る。
      - このマットの上に激怒トークン1個を載せる。
    increasedDifficulty: "レイジボーンがストライクを行ったら、このマットから激怒トークンを（3個ではなく）1個取り除く。"
    battle: 1
    rule: "<レイジボーン> と戦う。"
    cards:
      # ---- ネメシスデッキ ----
      - { placement: ネメシスデッキ, tier: 1, name: 切断, type: アタック,
          effect: "レイジボーンはストライクを行う。" }
      - { placement: ネメシスデッキ, tier: 1, name: 仮借なき怒り, type: アタック,
          effect: "暴走。ターン順カードの捨て山にネメシス側のターン順カードが2枚あるなら、追加で暴走（2回）。" }
      - placement: ネメシスデッキ
        tier: 1
        name: 煽動獣
        type: ミニオン
        life: 5
        effect: "継続：グレイヴホールドはレイジボーンのネメシスマットに載っている激怒トークンの数に等しいダメージを受ける。"
      - placement: ネメシスデッキ
        tier: 2
        name: 嘲笑者
        type: ミニオン
        life: 9
        effect: |-
          継続：グレイヴホールドは3ダメージを受ける。
          または
          暴走（2回）。
      - placement: ネメシスデッキ
        tier: 2
        name: 修羅招来
        type: パワー
        effect: |-
          廃棄：7エーテルを消費する。
          パワー2：暴走。プレイヤー1人は1ダメージを受ける。そのプレイヤーは、レイジボーンのネメシスマットに載っている激怒トークンの数に等しいダメージを追加で受ける。
      - placement: ネメシスデッキ
        tier: 2
        name: 血塗られた叫び
        type: パワー
        effect: |-
          廃棄：自分のチャージ4を失う。
          パワー2：暴走（4回）。
      - { placement: ネメシスデッキ, tier: 3, name: 猛襲, type: アタック,
          effect: "暴走（3回）。全プレイヤーを通じて、レイジボーンのネメシスマットに載っている激怒トークンの数に等しい枚数のカードを捨てる。" }
      - { placement: ネメシスデッキ, tier: 3, name: 憤怒の化身, type: ミニオン, life: 16,
          effect: "継続：レイジボーンはストライクを行う。" }
      - placement: ネメシスデッキ
        tier: 3
        name: 死のうねり
        type: パワー
        effect: |-
          廃棄：8エーテルを支払う。
          パワー2：レイジボーンはストライクを2回行う。

      # ---- ストライク ----
      - { placement: ストライク, name: 呼ぶ, effect: "プレイヤー1人は4ダメージを受ける。" }
      - { placement: ストライク, name: 壊す, effect: "グレイヴホールドは5ダメージを受ける。" }
      - { placement: ストライク, name: えぐる, effect: "体力が最も少ないプレイヤー1人は2ダメージを受ける。" }
      - { placement: ストライク, name: 狂う, effect: "開放状態の破孔が最も多いプレイヤー1人は3ダメージを受ける。" }
      - { placement: ストライク, name: 崩す, effect: "グレイヴホールドは3ダメージを受ける。プレイヤー1人は1ダメージを受ける。" }
      - { placement: ストライク, name: 奪う,
          effect: "全プレイヤーを通じて、セットしている呪文カードの中で、最もコストが大きいほうから2枚を捨てる。" }
  - name: 甲殻の女王
    level: 3
    life: 60
    unleash: "殻の子トークン2個をプレイに出す。"
    additionalRules: |-
      - 殻の子トークンは体力1のミニオンカードであるとみなす。
      - 殻の子トークンがプレイに出たら、それを殻の子トラックの空いたマスに配置する（上から下、左から右の順）。
      - プレイヤーが殻の子トークン1個にダメージを与えるとき、そのプレイヤーは自分自身が1ダメージを受けてもよい。そうしたなら、そこで与えるダメージを複数の殻の子トークンに望むように割り振る。
      - プレイに殻の子トークン15個が出ている状態でさらに殻の子トークンがプレイに出ることになったら、その代わりにグレイヴホールドに1ダメージを与える。
    setup: "- 殻の子トラックをこのマットの横に置き、その最初の2マスに殻の子トークンを1個ずつ配置する。"
    increasedDifficulty: "暴走効果：殻の子トークン2個をプレイに出す代わりに、3個を出す。"
    battle: 1
    rule: "<甲殻の女王> と戦う。"
    cards:
      # ---- ネメシスデッキ ----
      - { placement: ネメシスデッキ, tier: 1, name: 無限乱舞, type: アタック,
          effect: "甲殻の女王は群舞を行う。" }
      - { placement: ネメシスデッキ, tier: 1, name: 孵化, type: アタック,
          effect: "ターン順カードの捨て山の枚数に等しい数の殻の子トークンをプレイに出す。" }
      - placement: ネメシスデッキ
        tier: 1
        name: 母体虫
        type: ミニオン
        life: 5
        effect: |-
          プレイに殻の子トークンが1個でも出ているなら、このミニオンに与えられる全ダメージは0になる。
          継続：プレイに殻の子トークン1個を出す。
      - placement: ネメシスデッキ
        tier: 2
        name: 寄生
        type: アタック
        effect: |-
          甲殻の女王は群舞を2回行う。
          または
          プレイヤー1人は4ダメージを受ける。
      - placement: ネメシスデッキ
        tier: 2
        name: 忌わしき数の力
        type: パワー
        effect: |-
          殻の子トークンの体力は2になる。各ターンの終了時、ダメージを受けている殻の子トークンは体力をすべて回復する。
          即時：暴走。
          パワー3：甲殻の女王は群舞を行う。
      - placement: ネメシスデッキ
        tier: 2
        name: 消される太陽
        type: パワー
        effect: |-
          廃棄：チャージトークン4個を捨てる。
          パワー2：甲殻の女王は群舞を行う。暴走。甲殻の女王は群舞を行う。
      - placement: ネメシスデッキ
        tier: 3
        name: 産卵
        type: アタック
        effect: |-
          甲殻の女王は群舞を行う。
          暴走。
          甲殻の女王は群舞を行う。
      - placement: ネメシスデッキ
        tier: 3
        name: 蛆虫機関
        type: ミニオン
        life: '*'
        effect: |-
          即時：暴走（3回）。その後、このミニオンの体力を、プレイに出ている殻の子トークンの数の2倍に設定する。
          継続：甲殻の女王は群舞を行う。
      - placement: ネメシスデッキ
        tier: 3
        name: 軍勢への号令
        type: パワー
        effect: |-
          即時：暴走（2回）。
          パワー2：プレイに出ている殻の子トークンの半分（端数切り上げ）を捨てる。グレイヴホールドはこうして捨てられた殻の子トークン1個につき2ダメージを受ける。甲殻の女王は群舞を行う。
  - name: 歪んだ仮面
