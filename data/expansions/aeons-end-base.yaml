id: aeons-end-base
name: イーオンズ・エンド
badge: 基本
cards:
  # ---- Gem (宝石) ----
  - id: R01
    name: 燃えるオパール
    type: 宝石
    cost: 5
    effect: "3エーテルを得る。自分の手札にあるカード1枚を捨ててもよい。そうしたなら、仲間1人はカード1枚を引く。"
  - id: R02
    name: 雲色サファイア
    type: 宝石
    cost: 6
    effect: "3エーテルを得る。これがこのターン中にプレイした最初の <雲色サファイア> なら、仲間1人はチャージ1を得る。"
  - id: R03
    name: 群生ダイヤモンド
    type: 宝石
    cost: 4
    effect: "2エーテルを得る。これがこのターン中にプレイした2枚目の <群生ダイヤモンド> なら、追加で2エーテルを得る。"
  - id: R04
    name: 翡翠
    type: 宝石
    cost: 2
    effect: "2エーテルを得る。"
  - id: R05
    name: 赤熱ルビー
    type: 宝石
    cost: 4
    effect: "2エーテルを得る。追加で1エーテルを得る。追加で得たエーテルは呪文カードの獲得にのみ使用できる。"
  - id: R06
    name: 変化の真珠
    type: 宝石
    cost: 3
    effect: "2エーテルを得る。各プレイヤーはそれぞれ自分のデッキの一番上のカードを公開し、それを捨てるか、あるいはデッキの一番上に戻すかを選ぶ。"
  - id: R07
    name: グリスウッドの琥珀
    type: 宝石
    cost: 3
    effect: "これを獲得した時、捨て山ではなく自分のデッキの上にこれを配置してもよい。2エーテルを得る。"

  # ---- Relic (遺物) ----
  - id: R08
    name: 強撃杖
    type: 遺物
    cost: 4
    effect: "このターン中にセットした呪文1枚をキャストしてもよい。そうした場合、その呪文は追加で2ダメージを与える。"
  - id: R09
    name: 瓶詰の渦動
    type: 遺物
    cost: 3
    effect: "これを破壊する。自分の手札か捨て山にあるカード2枚までを破壊する。カード1枚を引く。"
  - id: R10
    name: 屈曲ダガー
    type: 遺物
    cost: 2
    effect: |-
      このターン中、次に破孔を強化あるいは開放するとき、そのコストは3エーテル低下する。
      または
      これを破壊する。1ダメージを与える。
  - id: R11
    name: 強化オーブ
    type: 遺物
    cost: 4
    effect: |-
      プレイヤー1人の破孔ひとつを強化する。
      または
      これを破壊する。グレイヴホールドは体力3を得る。
  - id: R12
    name: 魔術師の護符
    type: 遺物
    cost: 5
    effect: "チャージ1を得る。仲間1人はチャージ1を得る。"
  - id: R13
    name: ゆらめくプリズム
    type: 遺物
    cost: 3
    effect: |-
      自分の手札にある1枚の宝石カードを2回プレイし、そのカードを破壊する。
      または
      2エーテルを得る。

  # ---- Spell (呪文) ----
  - id: R14
    name: ヴィジョン増幅
    type: 呪文
    cost: 4
    effect: "キャスト：自分の閉鎖状態の破孔のうち、現在の強化コストが最小のもの1枚を強化する。2ダメージを与える。もし自分の破孔がすべて開放状態なら、追加で1ダメージを与える。"
  - id: R15
    name: 魔力結節
    type: 呪文
    cost: 7
    effect: |-
      セット中：自分のターンのメインフェイズ中に1回のみ、そのターンにプレイした宝石カード1枚を自分の手札に戻してもよい。
      キャスト：4ダメージを与える。
  - id: R16
    name: カオス・アーク
    type: 呪文
    cost: 6
    effect: "キャスト：3ダメージを与える。さらに、これに隣接する破孔にセットされている呪文1枚につき追加で2ダメージを与える。"
  - id: R17
    name: 飲み込む虚無
    type: 呪文
    cost: 7
    effect: "キャスト：自分の手札にあるカード2枚までを破壊する。こうして破壊したカード1枚につき3ダメージを与える。"
  - id: R18
    name: 闇色炎
    type: 呪文
    cost: 5
    effect: "キャスト：自分の手札にあるカード2枚までを捨てる。こうして捨てたカード1枚につき3ダメージを与える。"
  - id: R19
    name: エッセンス強奪
    type: 呪文
    cost: 5
    effect: "キャスト：3ダメージを与える。この時、自分の手札にあるカード1枚を捨ててもよい。そうしたなら、プレイヤー1人は体力1を得る。"
  - id: R20
    name: 凶雷
    type: 呪文
    cost: 5
    effect: |-
      この呪文は、強化を行っていない閉鎖状態の破孔にもセットできる。
      キャスト：3ダメージを与える。
  - id: R21
    name: 炎上
    type: 呪文
    cost: 4
    effect: "キャスト：2ダメージを与える。仲間1人はチャージ1を得る。"
  - id: R22
    name: 溶岩触肢
    type: 呪文
    cost: 4
    effect: |-
      セット中：自分のターンの呪文フェイズの終了時に1ダメージを与える。
      キャスト：3ダメージを与える。
  - id: R23
    name: 膨らむ忘却
    type: 呪文
    cost: 5
    effect: |-
      セット中：自分のターンのメインフェイズ中に1回だけ、1エーテルを獲得してもよい。
      キャスト：2ダメージを与える。この時、自分の手札にある宝石カード1枚を捨ててもよい。そうしたなら、そのコストに等しいだけのダメージを追加で与える。
  - id: R24
    name: 不死鳥炎
    type: 呪文
    cost: 3
    effect: "キャスト：2ダメージを与える。この時、自分のチャージ1を捨ててもよい。そうしたなら、追加で2ダメージを与える。"
  - id: R25
    name: 空間洞察
    type: 呪文
    cost: 6
    effect: "キャスト：2ダメージを与える。自分の開放状態の破孔1枚につき1ダメージを追加で与える。"
  - id: R26
    name: スペクトル残響
    type: 呪文
    cost: 3
    effect: "キャスト：2ダメージを与える。自分の手札にあるカード1枚を破壊してもよい。"
  - id: R27
    name: 熾火の鞭
    type: 呪文
    cost: 6
    effect: |-
      セット中：自分のターンのメインフェイズ中、2エーテルを消費してもよい。そうしたなら、プレイヤー1人がセットしている呪文をキャストする。
      キャスト：4ダメージを与える。

mages:
  - id: NA-END-70
    name: アーデルハイム
    job: 破孔魔術師の鍛冶屋
    breaches: [o, ←, →, ↓]
    uniqueCard:
      name: アメジスト片
