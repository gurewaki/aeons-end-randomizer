nemesisCards:
  # ---- 階層 1 ----
  - { category: 基本カード, tier: 1, name: 串刺し, type: アタック,
      effect: "暴走。プレイヤー1名は3ダメージを受け、カード1枚を引く。" }
  - { category: 基本カード, tier: 1, name: 殺戮, type: アタック,
      effect: "暴走。グレイヴホールドは3ダメージを受ける。" }
  - category: 基本カード
    tier: 1
    name: 霞を吐く者
    type: ミニオン
    life: 5
    effect: "継続：グレイヴホールドはこのミニオンの現在の体力に等しいダメージを受ける。その後、このミニオンは1ダメージを受ける。"
  - { category: 基本カード, tier: 1, name: 禍の雄, type: ミニオン, life: 6, effect: "継続：暴走。" }
  - category: 基本カード
    tier: 1
    name: 虚無の眼
    type: パワー
    effect: |-
      廃棄：6エーテルを消費する。
      パワー2：暴走（2回）。
  - category: 基本カード
    tier: 1
    name: 苦悶空間
    type: パワー
    effect: |-
      廃棄：自分の手札にある、コストが2エーテル以上のカード1枚を破壊する。
      パワー2：暴走。プレイヤー1名は自分の手札にあるカード3枚を捨てて1枚を引く。
  - category: 基本カード
    tier: 1
    name: 編みこまれた空
    type: パワー
    effect: |-
      廃棄：自分の手札にあるカード3枚を捨てる。
      パワー2：暴走。プレイヤー1人は4ダメージを受ける。
  - category: 基本カード
    tier: 1
    name: 静電放出
    type: パワー
    effect: "パワー3：セットしている呪文が最も多いプレイヤーは、自分がセットしている呪文ひとつにつき2ダメージを受ける。"

  # ---- 階層 2 ----
  - category: 基本カード
    tier: 2
    name: 魔力除去
    type: アタック
    effect: "暴走（2回）。セットしている呪文が最も多いプレイヤー1名は、それらのうち最もコストの大きい呪文1枚を捨てる。"
  - { category: 基本カード, tier: 2, name: 荒廃, type: アタック,
      effect: "暴走（2回）。プレイヤー1名は2ダメージを受ける。" }
  - category: 基本カード
    tier: 2
    name: 覚醒
    type: アタック
    effect: |-
      暴走（2回）。グレイヴホールドは3ダメージを受ける。
      または
      ネメシスカードの捨て山にある、最も新しく捨てられたミニオンカード1枚をプレイに戻す。
  - category: 基本カード
    tier: 2
    name: 焼灼者
    type: ミニオン
    life: 3
    effect: |-
      このミニオンにダメージが与えられた場合、そのダメージは常に1ダメージになる。
      継続：プレイヤー1人はこのミニオンの現在の体力に等しいダメージを受ける。
  - { category: 基本カード, tier: 2, name: 針歯獣, type: ミニオン, life: 11,
      effect: "継続：グレイヴホールドは2ダメージを受ける。" }
  - category: 基本カード
    tier: 2
    name: 毒蟲獣
    type: ミニオン
    life: 9
    effect: |-
      継続：体力が最も少ないプレイヤーは2ダメージを受ける。
      または
      プレイヤー1名は、セットされているコストが3エーテル以上の呪文カード1枚を捨てる。
  - category: 基本カード
    tier: 2
    name: 破砕光
    type: パワー
    effect: |-
      パワー1：グレイヴホールドは3ダメージを受ける。
      または
      プレイヤー1人は自分の手札にある宝石カード1枚を選んで捨てる。

      上記の選択を、さらに5回繰り返す。

  # ---- 階層 3 ----
  - category: 基本カード
    tier: 3
    name: 抹消
    type: アタック
    effect: "暴走（2回）。開放状態の破孔の数が最も多いプレイヤーは、自分の手札からカード4枚を破壊するか、あるいは4ダメージを受ける。"
  - { category: 基本カード, tier: 3, name: 倒壊, type: アタック,
      effect: "暴走（2回）。グレイヴホールドは4ダメージを受ける。" }
  - category: 基本カード
    tier: 3
    name: 闇よ、つどえ
    type: アタック
    effect: "プレイヤー1名は自分の捨て山を自分のデッキの上に移してシャッフルしてから、そのデッキの上から4枚のカードを破壊する。その後、暴走（2回）。"
  - category: 基本カード
    tier: 3
    name: 隔絶
    type: アタック
    effect: |-
      グレイヴホールドは4ダメージを受け、体力が最も少ないプレイヤーは4ダメージを受ける。
      または
      公開されている全てのネメシス側ターン順カードをターン順カードの山札に戻してそれをシャッフルする。
  - { category: 基本カード, tier: 3, name: 角礫体, type: ミニオン, life: 14,
      effect: "継続：暴走（2回）。" }
  - category: 基本カード
    tier: 3
    name: 破滅のイージス
    type: パワー
    effect: |-
      廃棄：7エーテルを消費する。
      パワー1：最もチャージが多いプレイヤーは4ダメージを受け、自分のチャージすべてを失う。
  - category: 基本カード
    tier: 3
    name: 現実断裂
    type: パワー
    effect: |-
      廃棄：セットされている、コストが3エーテル以上の呪文カード2枚を破壊する。
      パワー1：暴走（3回）。
