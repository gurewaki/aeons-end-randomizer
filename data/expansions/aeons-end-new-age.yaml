treasures:
  # ---- レベル 1 (プレイヤーカード形式) ----
  - { level: 1, name: ブラマの隠された光, type: 呪文,
      effect: "キャスト：1ダメージを与える。1エーテルを得る。" }
  - level: 1
    name: ガルのトーチ
    type: 呪文
    effect: |-
      キャスト：1ダメージを与える。
      または
      プレイヤー1人の破孔1枚を強化する。
  - level: 1
    name: カディアのエメラルド片
    type: 宝石
    effect: |-
      1エーテルを得る。
      または
      プレイヤー1人は体力1を得る。
  - level: 1
    name: ミストのガーネット片
    type: 宝石
    effect: |-
      1エーテルを得る。
      または
      プレイヤー1人がセット中の呪文1枚をキャストする。
  - { level: 1, name: ザクソスの葬火, type: 呪文,
      effect: "キャスト：1ダメージを与える。仲間1人は手札1枚を捨ててもよい。そうしたなら、追加で2ダメージを与える。" }
  - level: 1
    name: アーデルハイムのアメジスト片
    type: 宝石
    effect: |-
      1エーテルを得る。
      仲間1人はカード1枚を引いてもよい。その後、手札1枚を捨てる。
  - level: 1
    name: ゲクスの砕かれた晶洞石
    type: 宝石
    effect: |-
      1エーテルを得る。
      仲間1人の捨て山の一番上のカードを自分の手札に移してもよい。
  - level: 1
    name: ジアンのムーンストーン片
    type: 宝石
    effect: |-
      1エーテルを得る。
      追加で1エーテルを得る。このエーテルは宝石の獲得にのみ使用できる。
  - level: 1
    name: ラッシュのクォーツ片
    type: 宝石
    effect: |-
      1エーテルを得る。
      ターン順カードの山の一番上のカードを公開し、それを山の底か一番上にどちらかに移す。それがプレイヤーのターン順カードなら、追加で1エーテルを得る。
  - { level: 1, name: ザクソスのフレア, type: 呪文,
      effect: "キャスト：ターン順カードの山の一番上のカードを公開し、それを山の一番上に戻す。それがプレイヤーのターン順カードなら3ダメージを与える。そうでないなら、1ダメージを与える。" }

  # ---- レベル 2 ----
  - level: 2
    name: 甲殻の破片
    effect: |-
      このゲームの開始時、これを1つの遺物か呪文のサプライの山の横に配置する。
      プレイヤーがこれを配置したサプライの山からカード1枚を獲得するたび、そのプレイヤーは自分の破孔1枚を強化する。
  - level: 2
    name: 浸透する枷
    effect: |-
      このゲームの開始時、これをコストが7エーテル以上の1つのサプライの山の横に配置する。
      これを配置した山からプレイヤーがカードを獲得するためのコストは1エーテルだけ減少する。
  - { level: 2, name: 輝く魔術師の外套,
      effect: "プレイヤーが自分の特殊能力の適用を終えたら、2ダメージを与える。" }
  - level: 2
    name: デスマインドの遺骨
    effect: |-
      プレイヤーが破孔を開放するたび、そのプレイヤーはチャージ1を得る。
      プレイヤーのターン開始時、そのプレイヤーの破孔がすべて開放しているなら、そのプレイヤーはチャージ1を得る。
  - { level: 2, name: 棘付鞭,
      effect: "プレイヤーが破孔を開放するたび、そのプレイヤーは2ダメージを与える。" }
  - { level: 2, name: 抹消アミュレット,
      effect: "プレイヤーが自分の特殊能力の適用を終えたら、プレイヤー1人は手札1枚を破壊してもよい。" }
  - level: 2
    name: 憤怒核
    effect: |-
      このゲームの開始時、これを1つの呪文か遺物のサプライの山の横に配置する。
      プレイヤーがこれを配置したサプライの山からカードを1枚獲得するたび、そのプレイヤーは2ダメージを与える。
  - { level: 2, name: 大食いの歯,
      effect: "サプライの山にある最後のカードが獲得されるか、あるいは破壊されるたびに、プレイヤー1人は6ダメージを与える。" }

  # ---- レベル 3 ----
  - { level: 3, name: 新緑の杖,
      effect: "あなたは呪文を獲得するたびに体力1を得る。" }
  - level: 3
    name: たなびく外套
    effect: |-
      あなたは自分のターンの開始時に1エーテルを得る。このエーテルは遺物の獲得にのみ使用できる。
      あなたが遺物を獲得したら、それを自分のデッキの一番上に移してもよい。
  - { level: 3, name: 忘れられた装身具,
      effect: "あなたはこのゲームでの最初の自分のターンの開始時に、自分の閉鎖状態の破孔をそれぞれ1回だけ強化する。" }
  - { level: 3, name: 加速ガントレット,
      effect: "あなたはこのゲームで最初の自分のターンの開始時に、コストが4エーテル以下のカードを1枚獲得する。" }
  - { level: 3, name: 惑乱のとばり,
      effect: "あなたは自分の呪文フェイズ中に2枚以上の呪文をキャストしたら、2エーテルを得る。" }
  - { level: 3, name: 精密拡大器,
      effect: "あなたがキャストする呪文のコストが2エーテル以上なら、追加で1ダメージを与える。" }
  - { level: 3, name: 破壊のプリズム,
      effect: "あなたの破孔がすべて開放状態なら、自分がキャストする呪文は追加で2ダメージを与える。" }
  - { level: 3, name: 鋭利なる結晶,
      effect: "あなたがネメシスに呪文でダメージを与えるなら、その呪文は追加で1ダメージを与える。" }
  - { level: 3, name: 調音のブローチ,
      effect: "ターン中に1回だけ、あなたはコストが6エーテル以上の呪文をキャストしたら、チャージ2を得る。" }
  - { level: 3, name: 精髄抽出機,
      effect: "あなたはコストが5エーテル以上の宝石をプレイするたび、追加で1エーテルを得る。" }
